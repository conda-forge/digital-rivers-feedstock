{% set name = "digital-rivers" %}
{% set version = "0.4.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/serapeum-org/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: ed374f89b385ef066cf2339db7dd9edc13cf74f0552ce8c5e265ab7130ae4007

build:
  number: 1
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=80.0.0
    - wheel
  run:
    - python >={{ python_min }}
    - pyramids-viz >=0.32.0
    - gdal >=3.12,<3.13
    - geopandas >=1.0.0
    - numba >=0.60.0,<1
    - numpy >=2.0.0

test:
  imports:
    - digitalrivers
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

outputs:
  - name: {{ name }}

  - name: {{ name }}-all
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name, exact=True) }}
        - pyramids-lazy >=0.32.0
    test:
      imports:
        - digitalrivers

about:
  home: https://github.com/serapeum-org/digital-rivers
  summary: DEM processing library
  description: |
    digital-rivers is a GIS utility library for Digital Elevation Model (DEM)
    processing, terrain analysis, and raster data manipulation. It uses GDAL as
    its geospatial backend and builds on the pyramids library for dataset
    operations, adding hydrology-specific semantics such as sink filling, D8
    flow direction, flow accumulation, stream extraction, watershed
    delineation, and terrain colour-relief generation.
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE.md
  doc_url: https://serapeum-org.github.io/digital-rivers
  dev_url: https://github.com/serapeum-org/digital-rivers

extra:
  recipe-maintainers:
    - MAfarrag
